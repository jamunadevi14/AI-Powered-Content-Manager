<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Content Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <h2>⚙️ Configuration</h2>
        <div class="input-group">
            <label for="apiKey">Gemini API Key:</label>
            <input type="password" id="apiKey" placeholder="Enter your API Key here...">
            <small class="hint">Get a free key from Google AI Studio</small>
        </div>
        <hr>
        <h2>🧭 Navigation</h2>
        <button class="nav-btn active" onclick="switchTab('generator')">📝 Content Generator</button>
        <button class="nav-btn" onclick="switchTab('summarizer')">🔍 Text Summarizer</button>
        <button class="nav-btn" onclick="switchTab('transformer')">🎭 Tone Transformer</button>
    </div>

    <div class="main-content">
        <h1>🚀 AI-Powered Content Manager</h1>
        <p>Automate your content pipeline directly from your browser.</p>
        <hr>

        <div id="generator" class="tab-content active">
            <h2>📝 Smart Content Generator</h2>
            <div class="form-group">
                <label>What do you want to create?</label>
                <select id="genType">
                    <option value="Blog Post">Blog Post</option>
                    <option value="Social Media Caption">Social Media Caption</option>
                    <option value="Email Newsletter">Email Newsletter</option>
                    <option value="Marketing Copy">Marketing Copy</option>
                </select>
            </div>
            <div class="form-group">
                <label>Enter the topic or prompt:</label>
                <input type="text" id="genTopic" placeholder="e.g., Benefits of remote working...">
            </div>
            <div class="form-group">
                <label>Keywords to include (optional):</label>
                <input type="text" id="genKeywords" placeholder="e.g., productivity, flexibility, balance">
            </div>
            <button class="action-btn" onclick="handleGenerate()">Generate Content</button>
        </div>

        <div id="summarizer" class="tab-content">
            <h2>🔍 Intelligent Text Summarizer</h2>
            <div class="form-group">
                <label>Paste your long article or text here:</label>
                <textarea id="sumText" rows="8" placeholder="Paste long blocks of text here..."></textarea>
            </div>
            <div class="form-group">
                <label>Summary Format:</label>
                <select id="sumStyle">
                    <option value="Quick Bullet Points">Quick Bullet Points</option>
                    <option value="Standard Paragraph">Standard Paragraph</option>
                    <option value="Detailed Outline">Detailed Outline</option>
                </select>
            </div>
            <button class="action-btn" onclick="handleSummarize()">Generate Summary</button>
        </div>

        <div id="transformer" class="tab-content">
            <h2>🎭 Tone Transformer</h2>
            <div class="form-group">
                <label>Enter your original copy:</label>
                <textarea id="transText" rows="6" placeholder="Type or paste text you want to rewrite..."></textarea>
            </div>
            <div class="form-group">
                <label>Select Target Tone:</label>
                <select id="transTone">
                    <option value="Professional & Corporate">Professional & Corporate</option>
                    <option value="Casual & Friendly">Casual & Friendly</option>
                    <option value="Persuasive & Sales-driven">Persuasive & Sales-driven</option>
                    <option value="Witty & Humorous">Witty & Humorous</option>
                </select>
            </div>
            <button class="action-btn" onclick="handleTransform()">Transform Tone</button>
        </div>

        <div id="outputContainer" class="output-container hidden">
            <h3>✨ Result:</h3>
            <div id="outputLoader" class="loader hidden">Processing with AI...</div>
            <div id="outputText" class="output-text"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
